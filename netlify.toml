[build]
  publish = "."

[[headers]]
  for = "/index.html"
  [headers.values]
    # Always serve fresh HTML so live-data JS is never stale
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.xlsx"
  [headers.values]
    Content-Disposition = "attachment"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.pdf"
  [headers.values]
    Cache-Control = "public, max-age=86400"
